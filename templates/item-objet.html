<form class="bloodman-item">
  <label>NOM</label>
  <input name="name" value="{{item.name}}" />

  <label>MARQUAGE</label>
  <input type="text" name="system.mark" value="{{item.system.mark}}" />

  <label>PETITES NOTES</label>
  <input type="text" name="system.noteSmall" value="{{item.system.noteSmall}}" />

  <label>NOTES</label>
  <textarea name="system.notes">{{item.system.notes}}</textarea>
</form>
