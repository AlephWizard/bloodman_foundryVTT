<form class="bloodman-item item-arme">
  <div class="item-header">
    <img class="item-image" src="{{item.img}}" data-edit="img" />
    <div class="item-name-field">
      <label>NOM</label>
      <input name="name" value="{{item.name}}" />
    </div>
  </div>

  <label>TYPE D'ARME</label>
  <select name="system.weaponType">
    {{#select item.system.weaponType}}
      <option value="arme de corps &agrave; corps">Arme de corps &agrave; corps</option>
      <option value="arme &agrave; distance">Arme &agrave; distance</option>
    {{/select}}
  </select>

  <label>DE DE DEGATS</label>
  <select name="system.damageDie">
    {{#select item.system.damageDie}}
      <option value="d4">d4</option>
      <option value="d6">d6</option>
      <option value="d8">d8</option>
      <option value="d10">d10</option>
      <option value="d12">d12</option>
    {{/select}}
  </select>

  <label>MUNITIONS INFINIES</label>
  <div class="toggle-group">
    <label class="toggle-option">
      <input type="radio" name="system.infiniteAmmo" value="true" data-dtype="Boolean" {{#if item.system.infiniteAmmo}}checked{{/if}} />
      OUI
    </label>
    <label class="toggle-option">
      <input type="radio" name="system.infiniteAmmo" value="false" data-dtype="Boolean" {{#unless item.system.infiniteAmmo}}checked{{/unless}} />
      NON
    </label>
  </div>

  <label>NOTES</label>
  <textarea name="system.notes">{{item.system.notes}}</textarea>
</form>
