<form class="bloodman-item item-protection">
  <div class="item-header">
    <img class="item-image" src="{{item.img}}" data-edit="img" />
    <div class="item-name-field">
      <label>NOM</label>
      <input name="name" value="{{item.name}}" />
    </div>
  </div>

  <label>PA</label>
  <input type="number" name="system.pa" value="{{item.system.pa}}" />

  <label>NOTES</label>
  <textarea name="system.notes">{{item.system.notes}}</textarea>
</form>
